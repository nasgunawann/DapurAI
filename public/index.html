<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DapurAI - Smart Pantry Manager</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Sora", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            colors: {
              kitchen: {
                50: "#f4fff6",
                100: "#defce7",
                600: "#35a164",
                700: "#257243",
                900: "#174d2d"
              },
              spice: {
                100: "#ffe6c9",
                500: "#f08a24",
                700: "#d36b14"
              }
            },
            boxShadow: {
              chat: "0 20px 45px rgba(23, 77, 45, 0.18)"
            }
          }
        }
      };
    </script>
  </head>
  <body class="h-dvh overflow-hidden bg-gradient-to-br from-kitchen-50 via-amber-50 to-orange-100 text-slate-800 antialiased">
    <main class="flex h-dvh w-full flex-col overflow-hidden">
      <header class="flex items-center justify-between border-b border-kitchen-100/80 bg-white/75 px-3 py-2 backdrop-blur sm:px-5 sm:py-3">
        <div>
          <h1 class="text-sm font-semibold text-kitchen-900 sm:text-base">DapurAI</h1>
          <p class="text-[11px] text-slate-500 sm:text-xs">Asisten memasak kamu</p>
        </div>
        <div class="flex items-center gap-2">
          <span
            id="ai-status-badge"
            class="rounded-full bg-slate-200 px-3 py-1 text-[11px] font-medium text-slate-600 sm:text-xs"
            >Mengecek...</span
          >
        </div>
      </header>

      <section
        id="chat-box"
        aria-live="polite"
        class="flex-1 space-y-3 overflow-y-auto bg-gradient-to-b from-white/85 to-kitchen-50/55 px-2 py-3 sm:px-5 sm:py-4"
      ></section>

      <section class="border-t border-kitchen-100/80 bg-white/92 px-2 pb-[max(0.65rem,env(safe-area-inset-bottom))] pt-2 sm:px-5 sm:py-3">
        <form id="chat-form" class="space-y-2">
          <div class="flex items-end gap-2">
            <textarea
              id="user-input"
              class="min-h-10 max-h-32 flex-1 resize-y rounded-xl border border-kitchen-100 bg-white px-3 py-2 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 focus:border-kitchen-600 focus:ring-2 focus:ring-kitchen-200"
              placeholder="Contoh: Saya punya telur, bayam, bawang putih, dan nasi dingin..."
              rows="1"
              required
            ></textarea>
            <input id="image-input" type="file" accept="image/*" class="sr-only" />
            <label
              for="image-input"
              class="inline-flex h-10 w-10 cursor-pointer items-center justify-center rounded-xl border border-kitchen-200 bg-white text-kitchen-700 transition hover:border-kitchen-400 hover:bg-kitchen-50"
              title="Tambahkan foto bahan"
              aria-label="Tambahkan foto bahan"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5" aria-hidden="true">
                <path d="M21.44 11.05l-8.49 8.49a6 6 0 01-8.49-8.49l8.49-8.49a4 4 0 115.66 5.66l-8.49 8.49a2 2 0 11-2.83-2.83l7.78-7.78" />
              </svg>
            </label>
            <button
              type="submit"
              id="submit-btn"
              class="h-10 rounded-xl bg-kitchen-700 px-4 py-2 text-sm font-semibold text-white transition hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-60"
            >
              Kirim
            </button>
          </div>

          <div id="preview-wrap" class="hidden items-center gap-2 rounded-lg border border-kitchen-100 bg-kitchen-50 px-2 py-2">
            <img
              id="image-preview"
              alt="Preview bahan"
              class="h-10 w-10 rounded-lg border border-kitchen-200 object-cover sm:h-12 sm:w-12"
            />
            <small class="text-xs text-slate-600">Preview foto bahan</small>
          </div>

          <div class="flex items-center gap-2">
            <p class="text-[11px] text-slate-500">Memori chat disimpan secara lokal di browser ini.</p>
            <button
              id="clear-memory-btn"
              type="button"
              class="shrink-0 rounded-full border border-red-200 bg-white px-3 py-1 text-[11px] font-medium text-red-700 transition hover:border-red-400 hover:bg-red-50 sm:text-xs"
            >
              Hapus Riwayat Pesan
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
