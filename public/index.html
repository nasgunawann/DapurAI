<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DapurAI - Smart Pantry Manager</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Sora", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            colors: {
              kitchen: {
                50: "#f4fff6",
                100: "#defce7",
                600: "#35a164",
                700: "#257243",
                900: "#174d2d"
              },
              spice: {
                100: "#ffe6c9",
                500: "#f08a24",
                700: "#d36b14"
              }
            },
            boxShadow: {
              chat: "0 20px 45px rgba(23, 77, 45, 0.18)"
            }
          }
        }
      };
    </script>
  </head>
  <body class="h-dvh overflow-hidden bg-gradient-to-br from-kitchen-50 via-amber-50 to-orange-100 text-slate-800 antialiased">
    <main class="flex h-dvh w-full flex-col overflow-hidden">
      <header class="flex items-center justify-between border-b border-kitchen-100/80 bg-white/75 px-3 py-2 backdrop-blur sm:px-5 sm:py-3">
        <div>
          <h1 class="text-sm font-semibold text-kitchen-900 sm:text-base">DapurAI</h1>
          <p class="text-[11px] text-slate-500 sm:text-xs">Asisten memasak kamu</p>
        </div>
        <span
          id="ai-status-badge"
          class="rounded-full bg-slate-200 px-3 py-1 text-[11px] font-medium text-slate-600 sm:text-xs"
          >Mengecek...</span
        >
      </header>

      <section
        id="chat-box"
        aria-live="polite"
        class="flex-1 space-y-3 overflow-y-auto bg-gradient-to-b from-white/85 to-kitchen-50/55 px-2 py-3 sm:px-5 sm:py-4"
      ></section>

      <section class="border-t border-kitchen-100/80 bg-white/92 px-2 pb-[max(0.65rem,env(safe-area-inset-bottom))] pt-2 sm:px-5 sm:py-3">
        <form id="chat-form" class="space-y-2">
          <textarea
            id="user-input"
            class="w-full resize-none rounded-xl border border-kitchen-100 bg-white px-3 py-2 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 focus:border-kitchen-600 focus:ring-2 focus:ring-kitchen-200"
            placeholder="Contoh: Saya punya telur, bayam, bawang putih, dan nasi dingin..."
            rows="2"
            required
          ></textarea>

          <div class="flex flex-wrap items-center gap-2">
            <input
              id="image-input"
              type="file"
              accept="image/*"
              class="block min-w-0 flex-1 cursor-pointer rounded-lg border border-kitchen-100 bg-white px-2 py-1 text-xs text-slate-500 file:mr-3 file:cursor-pointer file:rounded-md file:border-0 file:bg-kitchen-100 file:px-2 file:py-1 file:font-medium file:text-kitchen-900 hover:file:bg-kitchen-200"
            />
            <button
              type="submit"
              id="submit-btn"
              class="rounded-xl bg-gradient-to-r from-kitchen-700 to-kitchen-600 px-4 py-2 text-sm font-semibold text-white transition hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-60"
            >
              Kirim
            </button>
          </div>

          <div id="preview-wrap" class="hidden items-center gap-2 rounded-lg border border-kitchen-100 bg-kitchen-50 px-2 py-2">
            <img
              id="image-preview"
              alt="Preview bahan"
              class="h-10 w-10 rounded-lg border border-kitchen-200 object-cover sm:h-12 sm:w-12"
            />
            <small class="text-xs text-slate-600">Preview foto bahan</small>
          </div>

          <p class="text-[11px] text-slate-500">Proyek Demo. Merefresh halaman akan menghapus riwayat percakapan.</p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
